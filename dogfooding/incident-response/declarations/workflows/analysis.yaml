name: incident_analysis_flow
version: "0.1.0"
operations:
  - id: prepare
    kind: compile_context
    compiled_context: ../contexts/incident_context.yaml
    input_contracts: ["incident"]
    output_contracts: []
  - id: analyze
    kind: transform
    instruction: ../instructions/analyze_incident.md
    input_contracts: ["incident"]
    output_contracts: ["observation"]
edges:
  - from: prepare
    to: analyze
guards: []
