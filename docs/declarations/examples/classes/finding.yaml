# v0.3 format: standing dimensions use kernel:* prefixed IDs
name: finding
version: 0.2.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_standing:
    kernel:epistemic:
      - working
      - supported
    kernel:review:
      - unreviewed
      - accepted
    kernel:process:
      - completed
relation_rules:
  - relation_type: derived_from
    counterparty_classes:
      - source_note
    direction: outgoing
validators: []

