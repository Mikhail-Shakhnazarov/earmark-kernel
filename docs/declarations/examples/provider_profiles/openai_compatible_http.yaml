name: openai_compatible_http
version: 0.1.0
description: OpenAI-compatible profile using the generic HTTP generation provider.
provider: http_generation
model: gpt-4o-mini
auth_env: OPENAI_API_KEY
http:
  method: POST
  url_template: "https://api.openai.com/v1/chat/completions"
  auth:
    kind: bearer
    env: OPENAI_API_KEY
  request:
    content_type: application/json
    body:
      model: "{{model}}"
      messages:
        - role: user
          content: "{{input_text}}"
  response:
    text_path: "$.choices[0].message.content"
    input_tokens_path: "$.usage.prompt_tokens"
    output_tokens_path: "$.usage.completion_tokens"
budget:
  max_input_tokens: null
  max_output_tokens: 256
  max_cost_usd: null
  max_latency_ms: 30000
allowed_operations:
  - transform
exposure:
  allow_prose_objects: true
  allow_structured_declarations: false
  allow_work_surface_only: false
  allow_export_requests: false
response_contract:
  format: markdown
  must_return_candidate_only: true
  must_include_lineage: false
