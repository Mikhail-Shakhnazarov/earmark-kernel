# v0.3 format: transition dimensions and standing keys use kernel:* prefixed IDs
name: research_standing_policy
version: 0.2.0
description: Minimal standing policy for research synthesis examples.
transition_rules:
  - dimension: kernel:review
    from:
      - unreviewed
    to:
      - accepted
    requires_review: true
operation_requirements:
  - operation: export
    required_standing:
      kernel:review: accepted
    forbidden_standing:
      kernel:epistemic:
        - unresolved
escalations:
  - trigger: attempted_export_without_review
    severity: warning
    message: Export requires accepted review standing.
rationale: Demonstrates review-gated export.

