name: Design decision
description: Frame an architectural, semantic, or public-surface decision before implementation.
title: "design: "
labels:
  - design-decision
body:
  - type: textarea
    id: decision
    attributes:
      label: Decision to make
      description: State the decision clearly.
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior or state
      description: Describe what the repository does today.
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options considered
      description: List the viable options. Include a default recommendation only if one is already clear.
      placeholder: |
        Option A — ...
        Option B — ...
        Option C — ...
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Trade-offs
      description: Explain what each option preserves, breaks, simplifies, or complicates.
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected surfaces
      description: Name affected crates, commands, docs, examples, tests, or public claims.
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility risk
      description: Note user-visible behavior changes, data migration concerns, or API/output changes.
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence or prior context
      description: Link to relevant issues, files, tests, audit findings, or discussion.
    validations:
      required: false
