name: Bug report
description: Report reproducible behavior that appears incorrect.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest sequence of commands or actions that reproduces the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Commit SHA, branch, tag, or local checkout description.
      placeholder: main @ <commit>
    validations:
      required: true

  - type: textarea
    id: workspace
    attributes:
      label: Workspace state
      description: Describe the relevant workspace state, active system, declarations, test fixture, or root layout.
    validations:
      required: false

  - type: textarea
    id: output
    attributes:
      label: Command output or logs
      description: Paste relevant output. Remove secrets before posting.
      render: text
    validations:
      required: false

  - type: textarea
    id: verification
    attributes:
      label: Verification attempted
      description: List commands run, such as cargo test, cargo check, or a specific CLI command.
      placeholder: |
        cargo fmt --all -- --check
        cargo check --workspace
        cargo test --workspace
        cargo clippy --workspace --all-targets -- -D warnings
    validations:
      required: false
