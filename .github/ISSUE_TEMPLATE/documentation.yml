name: Documentation issue
description: Report stale, unclear, missing, or mechanically incorrect documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: input
    id: path
    attributes:
      label: Document path
      description: Path to the affected document or section.
      placeholder: docs/reference/cli.md
    validations:
      required: true

  - type: dropdown
    id: problem_type
    attributes:
      label: Problem type
      multiple: true
      options:
        - inaccurate command or flag
        - missing expected output
        - unclear explanation
        - stale status claim
        - broken link
        - wrong document register
        - other
    validations:
      required: true

  - type: textarea
    id: current_text
    attributes:
      label: Current text or section
      description: Paste the relevant text or describe the affected section.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain what is wrong, stale, unclear, or missing.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed correction
      description: Suggest replacement wording or the intended documentation behavior if known.
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link to the command, code path, test, or output that supports the correction.
    validations:
      required: false
