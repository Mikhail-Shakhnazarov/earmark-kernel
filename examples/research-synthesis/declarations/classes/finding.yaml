name: finding
version: 0.1.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_epistemic:
    - working
    - supported
  allowed_review:
    - unreviewed
    - accepted
  allowed_process:
    - active
    - completed
relation_rules:
  - relation_type: derived_from
    counterparty_classes:
      - source_note
validators: []
