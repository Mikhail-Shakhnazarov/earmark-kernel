name: research_synthesis
version: 0.1.0
description: "A two-stage research synthesis workflow."
operations:
  - id: extract_from_all
    kind: project
    input_contracts: [source_note]
    output_contracts: [source_notes_for_extraction]
    compiled_context:
      id: source_notes_for_extraction
      version_id: latest

  - id: extract_findings
    kind: transform
    input_contracts: [source_notes_for_extraction]
    output_contracts: [finding]
    instruction:
      id: source_to_finding
      version_id: latest

  - id: group_findings
    kind: project
    input_contracts: [finding]
    output_contracts: [findings_for_summary]
    compiled_context:
      id: findings_for_summary
      version_id: latest

  - id: synthesize_summary
    kind: transform
    input_contracts: [findings_for_summary]
    output_contracts: [summary]
    instruction:
      id: finding_to_summary
      version_id: latest

edges:
  - from: extract_from_all
    to: extract_findings
  - from: extract_findings
    to: group_findings
  - from: group_findings
    to: synthesize_summary

guards: []
