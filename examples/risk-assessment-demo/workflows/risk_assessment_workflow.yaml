name: risk_assessment_workflow
version: "1.0.0"
description: A multi-stage workflow for risk assessment with branching and joining.
operations:
  - id: compile_claim_context
    kind: compile_context
    compiled_context: "../contexts/claim_extraction.yaml"
  - id: extract_claims
    kind: transform
    instruction: "../instructions/extract_claims.md"
    output_contracts:
      - claim
  - id: compile_risk_context
    kind: compile_context
    compiled_context: "../contexts/risk_extraction.yaml"
  - id: extract_risks
    kind: transform
    instruction: "../instructions/extract_risks.md"
    output_contracts:
      - risk
  - id: compile_assessment_context
    kind: compile_context
    compiled_context: "../contexts/assessment_synthesis.yaml"
  - id: synthesize_assessment
    kind: transform
    instruction: "../instructions/synthesize_assessment.md"
    output_contracts:
      - assessment
  - id: review_assessment
    kind: review
  - id: export_assessment
    kind: export
    policy: "../policies/export_policy.yaml"

guards:
  - id: assessment_ready
    expression: "has_contract:assessment"

edges:
  - from: compile_claim_context
    to: extract_claims
  - from: compile_risk_context
    to: extract_risks
  - from: extract_claims
    to: compile_assessment_context
  - from: extract_risks
    to: compile_assessment_context
  - from: compile_assessment_context
    to: synthesize_assessment
  - from: synthesize_assessment
    to: review_assessment
    condition: assessment_ready
  - from: review_assessment
    to: export_assessment
