schema: earmark.path_system_manifest.v1
system_id: risk-assessment-demo
namespace: demo
title: Risk Assessment Demo System
description: A system demonstrating complex topology in Earmark.
classes:
  - ../classes/source_note.yaml
  - ../classes/claim.yaml
  - ../classes/risk.yaml
  - ../classes/assessment.yaml
instructions:
  - ../instructions/extract_claims.md
  - ../instructions/extract_risks.md
  - ../instructions/synthesize_assessment.md
compiled_contexts:
  - ../contexts/claim_extraction.yaml
  - ../contexts/risk_extraction.yaml
  - ../contexts/assessment_synthesis.yaml
provider_profiles:
  - ../profiles/mock_profile.yaml
workflows:
  - ../workflows/risk_assessment_workflow.yaml
standing_policies:
  - ../policies/export_policy.yaml
runtime_profile:
  execution_surface: "local"
  machine_output_default: "json"
  work_surface_mode: "prose"
default_compiled_context: ../contexts/claim_extraction.yaml
default_provider_profile: ../profiles/mock_profile.yaml
