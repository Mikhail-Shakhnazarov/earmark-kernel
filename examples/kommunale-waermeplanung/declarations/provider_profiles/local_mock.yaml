name: local_mock
version: 0.2.0
description: "Mock provider for local testing."
provider: mock
model: mock-v1
endpoint_env: null
auth_env: null
budget:
  max_input_tokens: null
  max_output_tokens: null
  max_cost_usd: null
  max_latency_ms: null
allowed_operations:
  - transform
exposure:
  allow_prose_objects: true
  allow_structured_declarations: false
  allow_work_surface_only: false
  allow_export_requests: false
response_contract:
  format: markdown
  must_return_candidate_only: true
  must_include_lineage: false
