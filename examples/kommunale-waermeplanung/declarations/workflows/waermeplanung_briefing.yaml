name: waermeplanung_briefing
version: 0.2.0
description: "Zweistufige Briefing-Pipeline: Befunde extrahieren, dann Briefingkarte erstellen."
operations:
  - id: quellnotizen_kompilieren
    kind: compile_context
    input_contracts: [quellnotiz]
    output_contracts: [quellnotizen_fuer_extraktion]
    compiled_context: "../compiled_contexts/quellnotizen_fuer_extraktion.yaml"

  - id: befunde_extrahieren
    kind: transform
    input_contracts: [quellnotizen_fuer_extraktion]
    output_contracts: [befund]
    instruction: "../instructions/quellnotiz_zu_befund.md"

  - id: befunde_kompilieren
    kind: compile_context
    input_contracts: [befund]
    output_contracts: [befunde_fuer_briefing]
    compiled_context: "../compiled_contexts/befunde_fuer_briefing.yaml"

  - id: briefing_erstellen
    kind: transform
    input_contracts: [befunde_fuer_briefing]
    output_contracts: [briefingkarte]
    instruction: "../instructions/befund_zu_briefing.md"

edges:
  - from: quellnotizen_kompilieren
    to: befunde_extrahieren
  - from: befunde_extrahieren
    to: befunde_kompilieren
  - from: befunde_kompilieren
    to: briefing_erstellen

guards: []
