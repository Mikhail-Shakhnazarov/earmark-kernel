name: knowledge_briefing
version: 0.2.1
description: "Two-stage knowledge briefing pipeline: extract findings, then synthesize briefing card."
operations:
  - id: compile_source_notes
    kind: compile_context
    compiled_context: "../compiled_contexts/source_notes_for_extraction.yaml"

  - id: extract_findings
    kind: transform
    output_contracts: [finding]
    instruction: "../instructions/source_to_finding.md"

  - id: compile_findings
    kind: compile_context
    compiled_context: "../compiled_contexts/findings_for_briefing.yaml"

  - id: synthesize_briefing
    kind: transform
    output_contracts: [briefing_card]
    instruction: "../instructions/finding_to_briefing.md"

edges:
  - from: compile_source_notes
    to: extract_findings
  - from: extract_findings
    to: compile_findings
  - from: compile_findings
    to: synthesize_briefing

guards: []
