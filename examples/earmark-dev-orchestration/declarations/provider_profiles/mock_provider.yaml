name: mock_provider
version: 0.1.0
description: Mock provider profile for testing the development loop without live provider access.
provider: mock
model: echo
budget:
  max_output_tokens: 2000
  max_latency_ms: 5000
allowed_operations:
  - transform
exposure:
  allow_prose_objects: true
  allow_structured_declarations: false
  allow_work_surface_only: false
  allow_export_requests: false
response_contract:
  format: text
  must_return_candidate_only: true
  must_include_lineage: false
