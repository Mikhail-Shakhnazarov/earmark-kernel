name: development_standing_policy
version: 0.1.0
description: Standing policy for the Earmark development orchestration loop.
transition_rules:
  - dimension: kernel:review
    from:
      - unreviewed
    to:
      - review_pending
      - accepted
      - rejected
    requires_review: true
  - dimension: kernel:review
    from:
      - review_pending
    to:
      - accepted
      - rejected
      - needs_revision
      - superseded
    requires_review: true
  - dimension: kernel:process
    from:
      - proposed
    to:
      - ready
      - dispatched
    requires_review: false
  - dimension: kernel:process
    from:
      - dispatched
    to:
      - implemented
      - closed
    requires_review: false
  - dimension: kernel:process
    from:
      - implemented
    to:
      - closed
    requires_review: true
operation_requirements:
  - operation: transform
    required_standing:
      kernel:review: unreviewed
    forbidden_standing:
      kernel:process:
        - closed
escalations:
  - trigger: attempted_transform_on_closed_task
    severity: warning
    message: Transform operation on a closed task is not allowed.
rationale: Governs the development loop lifecycle from task proposal through review and closure.
