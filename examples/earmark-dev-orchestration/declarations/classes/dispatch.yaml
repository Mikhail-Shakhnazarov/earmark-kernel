name: dispatch
version: 0.1.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_standing:
    kernel:process:
      - queued
      - running
      - succeeded
      - failed
      - cancelled
relation_rules:
  - relation_type: used_context
    counterparty_classes:
      - context_packet
  - relation_type: emitted_trace
    counterparty_classes:
      - trace_event
  - relation_type: produced_evidence
    counterparty_classes:
      - evidence
validators: []
