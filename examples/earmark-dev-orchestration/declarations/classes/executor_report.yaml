name: executor_report
version: 0.1.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_standing:
    kernel:review:
      - unreviewed
      - accepted
    kernel:process:
      - active
      - completed
    kernel:visibility:
      - internal
      - report_visible
relation_rules:
  - relation_type: evidences_report
    counterparty_classes:
      - git_change_summary
  - relation_type: verifies_report
    counterparty_classes:
      - gate_result
validators: []
