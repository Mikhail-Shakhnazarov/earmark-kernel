name: trace_event
version: 0.1.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_standing:
    kernel:process:
      - started
      - inspected
      - changed
      - tested
      - failed
      - blocked
      - resumed
      - completed
      - note
relation_rules:
  - relation_type: supported_by
    counterparty_classes:
      - evidence
validators: []
