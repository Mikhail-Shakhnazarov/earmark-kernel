name: git_change_summary
version: 0.1.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_standing:
    kernel:review:
      - unreviewed
      - accepted
    kernel:process:
      - active
      - completed
relation_rules:
  - relation_type: evidences_report
    counterparty_classes:
      - evidence
validators: []
