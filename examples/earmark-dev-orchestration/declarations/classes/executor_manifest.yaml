name: executor_manifest
version: 0.1.0
kind: object
required_headers:
  - title
payload_schema: inline:any
standing_rules:
  allowed_standing:
    kernel:review:
      - unreviewed
      - accepted
    kernel:process:
      - proposed
      - dispatched
      - closed
relation_rules:
  - relation_type: implements_manifest
    counterparty_classes:
      - executor_report
validators: []
